name: TSF Deploy

on:
  workflow_dispatch:
    inputs:
      shopify_deploy_test:
        description: 更新 Test 环境 scope / extension
        type: boolean
        default: false
      shopify_deploy_prod:
        description: 更新 PROD 环境 scope / extension
        type: boolean
        default: false
      render_service_test:
        description: 部署 Test Shopify App
        type: boolean
        default: false
      render_service_prod:
        description: 部署 PROD Shopify App
        type: boolean
        default: false
      render_worker_test:
        description: 部署 Test Worker
        type: boolean
        default: false
      render_worker_prod:
        description: 部署 PROD Worker
        type: boolean
        default: false

jobs:
  shopify_deploy_test:
    name: Extension Deploy Test
    if: inputs.shopify_deploy_test
    runs-on: ubuntu-latest
    environment: ShopifyConfig

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Shopify Deploy Test
        env:
          SHOPIFY_CLI_PARTNERS_TOKEN: ${{ secrets.SHOPIFY_CLI_PARTNERS_TOKEN }}
          SHOPIFY_API_KEY: "dec512b68e658e4f21588e3d4de0e748"
          DEPLOY_BRANCH: ${{ github.ref_name }}
        run: |
          echo "Deploying branch: $DEPLOY_BRANCH to Shopify App (Test)"
          shopify app deploy -c shopify.app.test.toml --allow-updates --allow-deletes

  shopify_deploy_prod:
    name: Extension Deploy PROD
    if: inputs.shopify_deploy_prod
    runs-on: ubuntu-latest
    environment: ShopifyConfig

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Shopify Deploy PROD
        env:
          SHOPIFY_CLI_PARTNERS_TOKEN: ${{ secrets.SHOPIFY_CLI_PARTNERS_TOKEN }}
          SHOPIFY_API_KEY: "fb9fc15cbec02bd735e2a5b491cf8409"
          DEPLOY_BRANCH: ${{ github.ref_name }}
        run: |
          echo "Deploying branch: $DEPLOY_BRANCH to Shopify App (PROD)"
          shopify app deploy -c shopify.app.prod.toml --allow-updates --allow-deletes

  render_service_test:
    name: Render Service Test
    if: inputs.render_service_test
    runs-on: ubuntu-latest
    environment: ShopifyConfig

    steps:
      - name: Render Service Test
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_TEST_SERVICE_ID }}
        run: |
          COMMIT="${{ github.sha }}"
          echo "Deploying commit: $COMMIT"
          RESPONSE=$(curl -s -o response.json -w "%{http_code}" -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"commitId\": \"$COMMIT\"}")
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 201 ]; then
            echo "Deploy to test Render triggered successfully. HTTP status: $RESPONSE"
          else
            echo "Failed to trigger deployment. HTTP status: $RESPONSE"
            cat response.json
            exit 1
          fi

  render_service_prod:
    name: Render Service PROD
    if: inputs.render_service_prod
    runs-on: ubuntu-latest
    environment: ShopifyConfig

    steps:
      - name: Render Service PROD
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_PROD_SERVICE_ID }}
        run: |
          COMMIT="${{ github.sha }}"
          echo "Deploying commit: $COMMIT"
          RESPONSE=$(curl -s -o response.json -w "%{http_code}" -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"commitId\": \"$COMMIT\"}")
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 201 ]; then
            echo "Deploy to prod Render triggered successfully. HTTP status: $RESPONSE"
          else
            echo "Failed to trigger deployment. HTTP status: $RESPONSE"
            cat response.json
            exit 1
          fi

  render_worker_test:
    name: Render Worker Test
    if: inputs.render_worker_test
    runs-on: ubuntu-latest
    environment: ShopifyConfig

    steps:
      - name: Render Worker Test
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: "srv-d93cqrtaeets73dg6cn0"
        run: |
          COMMIT="${{ github.sha }}"
          echo "Deploying Worker Test, commit: $COMMIT"
          RESPONSE=$(curl -s -o response.json -w "%{http_code}" -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"commitId\": \"$COMMIT\"}")
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 201 ]; then
            echo "Deploy to Worker Test triggered successfully. HTTP status: $RESPONSE"
          else
            echo "Failed to trigger deployment. HTTP status: $RESPONSE"
            cat response.json
            exit 1
          fi

  render_worker_prod:
    name: Render Worker PROD
    if: inputs.render_worker_prod
    runs-on: ubuntu-latest
    environment: ShopifyConfig

    steps:
      - name: Render Worker PROD
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: "srv-d8sqas4vikkc73f5nbog"
        run: |
          COMMIT="${{ github.sha }}"
          echo "Deploying Worker PROD, commit: $COMMIT"
          RESPONSE=$(curl -s -o response.json -w "%{http_code}" -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"commitId\": \"$COMMIT\"}")
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 201 ]; then
            echo "Deploy to Worker PROD triggered successfully. HTTP status: $RESPONSE"
          else
            echo "Failed to trigger deployment. HTTP status: $RESPONSE"
            cat response.json
            exit 1
          fi
